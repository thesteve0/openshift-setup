---
channel: fast-3.x

dataScienceCluster:
  version: v2
  components:
    dashboard:
      managementState: Managed
    feastoperator:
      managementState: Managed
    kserve:
      nim:
        managementState: Removed
      rawDeploymentServiceConfig: Headless
      managementState: Managed
    kueue:
      defaultClusterQueueName: default
      defaultLocalQueueName: default
      managementState: Removed
    llamastackoperator:
      managementState: Managed
    mlflowoperator:
      managementState: Managed
    modelregistry:
      registriesNamespace: rhoai-model-registries
      managementState: Managed
    ray:
      managementState: Managed
    trainingoperator:
      managementState: Managed
    trustyai:
      eval:
        lmeval:
          permitCodeExecution: allow
          permitOnline: allow
      managementState: Managed
    workbenches:
      workbenchNamespace: rhods-notebooks
      managementState: Managed
    aipipelines:
      argoWorkflowsControllers:
        managementState: Managed
      managementState: Managed

dataScienceClusterInitialization: null
dashboardConfig:
  disableLMEval: false
  genAiStudio: true
  modelAsService: true

modelServerSizes: null
notebookSizes: null

hardwareProfiles:
  - name: nvidia-l40s-gpu
    global: true
    displayName: NVIDIA L40S GPU
    identifiers:
      - displayName: CPU
        identifier: cpu
        resourceType: CPU
        defaultCount: 4
        minCount: 1
        maxCount: 8
      - displayName: Memory
        identifier: memory
        resourceType: Memory
        defaultCount: 8Gi
        minCount: 2Gi
        maxCount: 32Gi
      - displayName: NVIDIA L40S GPU
        identifier: nvidia.com/gpu
        resourceType: Accelerator
        defaultCount: 1
        minCount: 1
        maxCount: 1
    scheduling:
      type: Node
      node:
        nodeSelector:
          nvidia.com/gpu.present: "true"
        tolerations:
          - effect: NoSchedule
            key: nvidia.com/gpu
            operator: Exists
